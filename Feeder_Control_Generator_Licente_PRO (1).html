<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeder Control - Generator Licențe</title>
<style>
  body{margin:0;min-height:100vh;background:#06090a;color:#eef7f4;font-family:system-ui,-apple-system,Segoe UI,sans-serif;display:grid;place-items:center;padding:18px}
  .card{width:min(620px,100%);background:#111a1d;border:1px solid #25383d;border-radius:24px;padding:22px;box-shadow:0 22px 60px rgba(0,0,0,.35)}
  h1{margin:0 0 8px;font-size:28px;text-transform:uppercase;letter-spacing:.3px}
  p{color:#b9cac6;line-height:1.5}
  label{display:block;margin:16px 0 7px;color:#8da19d;font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.8px}
  input{width:100%;box-sizing:border-box;border-radius:16px;border:1px solid #25383d;background:#071012;color:#eef7f4;padding:16px;font-size:18px;font-weight:800}
  button{width:100%;margin-top:14px;border:0;border-radius:16px;background:#49e1a2;color:#071012;padding:16px;font-size:18px;font-weight:900;text-transform:uppercase}
  .out{margin-top:16px;padding:16px;border-radius:16px;background:#071012;border:1px dashed #49e1a2;font-size:22px;font-weight:900;letter-spacing:1px;text-align:center}
  .small{font-size:13px;color:#7f9692}
</style>
</head>
<body>
<div class="card">
  <h1>Generator licențe Feeder Control</h1>
  <p>Introdu ID-ul dispozitivului primit de la client. Generatorul îți dă codul PRO pentru acel telefon.</p>
  <label>ID dispozitiv client</label>
  <input id="device" placeholder="ex: DEV-ABC123XYZ9">
  <button onclick="gen()">Generează cod PRO</button>
  <div class="out" id="out">—</div>
  <p class="small">Păstrează acest fișier doar pentru tine. Dacă îl trimiți clienților, își pot genera singuri coduri.</p>
</div>
<script>
function simpleHash(str){
  let h1 = 0x811c9dc5;
  let h2 = 0x9e3779b9;
  for(let i=0;i<str.length;i++){
    const ch = str.charCodeAt(i);
    h1 ^= ch;
    h1 = Math.imul(h1, 16777619);
    h2 ^= ch + (h1 >>> 0);
    h2 = Math.imul(h2, 2246822507);
  }
  const a = (h1 >>> 0).toString(36).toUpperCase().padStart(7,"0").slice(-7);
  const b = (h2 >>> 0).toString(36).toUpperCase().padStart(7,"0").slice(-7);
  const c = ((h1 ^ h2) >>> 0).toString(36).toUpperCase().padStart(7,"0").slice(-7);
  return `FC-${a.slice(0,4)}-${b.slice(0,4)}-${c.slice(0,4)}`;
}
function expectedLicenseCode(deviceId){
  const secret = "FEEDER_CONTROL_TFL_PRO_2026_MARIUS_PRIVATE_SALT";
  return simpleHash(`${secret}|${deviceId}|PRO`);
}
function gen(){
  const id = document.getElementById("device").value.trim().toUpperCase();
  if(!id){ document.getElementById("out").textContent = "Introdu ID-ul"; return; }
  const code = expectedLicenseCode(id);
  document.getElementById("out").textContent = code;
  navigator.clipboard?.writeText(code);
}
</script>
</body>
</html>
